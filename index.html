<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Redirecting...</title>

<style>

body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#0b1020;
    color:white;
    font-family:Arial;
}

</style>

</head>

<body>

<h2>Redirecting...</h2>

<script>

const params = new URLSearchParams(window.location.search);

const id = params.get("id");

fetch("./courses.json")
.then(response => response.json())
.then(courses => {

    const course = courses.find(c => c.id === id);

    if(course){

        window.location.replace(course.url);

    }
    else{

        document.body.innerHTML="<h2>Course not found.</h2>";

    }

})
.catch(error=>{

    document.body.innerHTML="<h2>Unable to load courses.json</h2>";

    console.error(error);

});

</script>

</body>
</html>
